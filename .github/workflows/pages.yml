name: Deploy Hook 4 To Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: JavaScript Syntax Check
        run: |
          for file in hook-*/main.js; do
            node --check "$file"
          done

      - name: Validate HTML Links
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const root = "hook-4";
          const files = fs.readdirSync(root).filter((name) => name.endsWith(".html"));
          const htmlByFile = new Map();
          const idByFile = new Map();
          const failures = [];

          const hrefRegex = /<a\b[^>]*\bhref="([^"]+)"[^>]*>/gi;
          const idRegex = /\sid="([^"]+)"/gi;

          function getIds(fileName) {
            if (idByFile.has(fileName)) {
              return idByFile.get(fileName);
            }
            const html = htmlByFile.get(fileName) || "";
            const ids = new Set();
            for (const match of html.matchAll(idRegex)) {
              ids.add(match[1]);
            }
            idByFile.set(fileName, ids);
            return ids;
          }

          files.forEach((fileName) => {
            htmlByFile.set(fileName, fs.readFileSync(path.join(root, fileName), "utf8"));
          });

          for (const [fileName, html] of htmlByFile.entries()) {
            for (const match of html.matchAll(hrefRegex)) {
              const href = match[1].trim();
              const lowerHref = href.toLowerCase();

              if (!href || href === "#" || lowerHref.startsWith("javascript:")) {
                failures.push(`${root}/${fileName} has non-actionable link "${href || "(empty)"}".`);
                continue;
              }

              if (/^(https?:|mailto:|tel:)/i.test(href)) {
                continue;
              }

              if (href.startsWith("#")) {
                const anchor = href.slice(1);
                if (!getIds(fileName).has(anchor)) {
                  failures.push(`${root}/${fileName} points to missing anchor "#${anchor}".`);
                }
                continue;
              }

              const [relativeTarget, anchor] = href.split("#");
              const normalizedTarget = path.basename(relativeTarget.replace(/^\.\//, ""));

              if (!normalizedTarget.endsWith(".html")) {
                continue;
              }

              if (!htmlByFile.has(normalizedTarget)) {
                failures.push(`${root}/${fileName} points to missing page "${relativeTarget}".`);
                continue;
              }

              if (anchor && !getIds(normalizedTarget).has(anchor)) {
                failures.push(
                  `${root}/${fileName} points to missing anchor "${relativeTarget}#${anchor}".`,
                );
              }
            }
          }

          if (failures.length > 0) {
            console.error("HTML link validation failed:");
            failures.forEach((failure) => console.error(`- ${failure}`));
            process.exit(1);
          }

          console.log("HTML link validation passed.");
          NODE

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./hook-4"

      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
