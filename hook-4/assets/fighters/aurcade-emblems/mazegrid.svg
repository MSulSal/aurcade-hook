      <stop offset="0%" stop-color="#e4feff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2a6dff" stop-opacity="0.18"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ff8ff"/>
      <stop offset="100%" stop-color="#2a6dff"/>
