      <stop offset="0%" stop-color="#ffe9d3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d76f32" stop-opacity="0.18"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffc487"/>
      <stop offset="100%" stop-color="#d76f32"/>
